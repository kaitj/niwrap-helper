name: Python Tests

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.1.0

    - name: Run tests
      shell: bash
      run: >
        uv run --frozen pytest \
          --junitxml=pytest.xml \
          --cov-report=xml:coverage.xml \
          --cov=src \
          --log-level=DEBUG \
          --verbose \
          tests
    - name: Pytest coverage comment
      if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
      uses: MishaKav/pytest-coverage-comment@v1
      with:
        pytest-xml-coverage-path: ./coverage.xml
        junitxml-path: ./pytest.xml

  codegen:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.1.0
    - name: Check generated files are up-to-date
      run: |
        uv run scripts/generate_bids_tools.py
        git diff --exit-code || (echo "Generated files are out of date. Run: uv run scripts/generate_bids_tools.py" && exit 1)

  ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.1.0
    - name: Ruff format
      run: uv run --only-dev ruff format --check
    - name: Ruff check
      run: uv run --only-dev ruff check

  mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: astral-sh/setup-uv@v8.1.0
    - run: uv run --only-dev mypy .
