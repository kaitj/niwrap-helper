name: Python Tests

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6
    - name: Setup venv
      uses: ./.github/actions/setup-venv

    - name: Run tests
      shell: bash
      run: >
        uv run pytest \
          --junitxml=pytest-quick.xml \
          --cov=src tests \
          --log-level=DEBUG \
          --verbose

    - name: Generate combined coverage report
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: >
        uv run coverage xml -o coverage.xml

    - name: Merge JUnitXml files
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: >
        uv run scripts/merge_cov_junitxml.py

    - name: Pytest coverage comment
      if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
      uses: MishaKav/pytest-coverage-comment@v1
      with:
        pytest-xml-coverage-path: ./coverage.xml
        junitxml-path: ./pytest.xml

  codegen:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup venv
      uses: ./.github/actions/setup-venv
    - name: Check generated files are up-to-date
      run: |
        uv run scripts/generate_bids_tools.py
        git diff --exit-code || (echo "Generated files are out of date. Run: uv run scripts/generate_bids_tools.py" && exit 1)

  ruff:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup venv
      uses: ./.github/actions/setup-venv
      with:
        only-dev: true
    - name: Ruff format
      run: uv run ruff format --check
    - name: Ruff check
      run: uv run ruff check

  mypy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup venv
      uses: ./.github/actions/setup-venv
    - run: |
        uv run mypy .
